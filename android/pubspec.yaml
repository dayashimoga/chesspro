name: chessos_mobile
description: "ChessOS Pro — Complete Chess University Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  # Material Design 3
  material_color_utilities: ^0.11.1
  google_fonts: ^6.2.1
  # Chess Engine
  chess: ^0.8.1
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  # Networking
  dio: ^5.7.0
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.0
  path_provider: ^2.1.4
  # Navigation
  go_router: ^14.3.0
  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.4
  # Utils
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/puzzles/
    - assets/openings/
    - assets/university/
    - assets/games/

  fonts:
    - family: ChessPieces
      fonts:
        - asset: assets/fonts/chess-pieces.ttf
