name: ChessOS Pro — Enterprise CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint Checks
        run: npm run lint

      - name: Run TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Unit Tests & Verify Coverage
        run: npx vitest run --coverage
        env:
          COVERAGE_THRESHOLD: 90

      - name: Verify Documentation Completeness
        run: |
          for doc in PRD SRS ARCHITECTURE LLD DATABASE API SECURITY OPERATIONS USER_GUIDE DEVELOPER_GUIDE TEST_STRATEGY RELEASE_PLAN PROJECT_STATUS RELEASE_READINESS_REPORT; do
            if [ ! -f "docs/${doc}.md" ]; then
              echo "Error: Required documentation docs/${doc}.md is missing!"
              exit 1
            fi
          done
          echo "All 14 documentation files verified successfully."

      - name: Run Dependency Audit
        run: npm audit --audit-level=high

      - name: Build Application dist bundle
        run: npm run build
