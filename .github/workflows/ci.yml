name: ChessOS Pro — Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '22'

jobs:
  # ============================================================================
  # Quality Gates
  # ============================================================================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm --prefix frontend ci

      - name: Run ESLint
        run: npm --prefix frontend run lint

      - name: TypeScript Type Check
        run: npx --prefix frontend tsc --noEmit

  # ============================================================================
  # Unit & Integration Tests
  # ============================================================================
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm --prefix frontend ci

      - name: Run Vitest with Coverage
        run: npx --prefix frontend vitest run --coverage --reporter=json --outputFile=test-results.json

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/

      - name: Check Coverage Thresholds
        run: |
          echo "Checking coverage thresholds..."
          # Coverage threshold enforcement (target: 80%+)
          npx --prefix frontend vitest run --coverage --coverage.thresholds.lines=70 --coverage.thresholds.branches=70 --coverage.thresholds.functions=70 --coverage.thresholds.statements=70 || echo "Warning: Coverage below target"

  # ============================================================================
  # E2E Tests
  # ============================================================================
  e2e-tests:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright Browsers
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Build Frontend
        run: npm --prefix frontend run build

      - name: Run E2E Tests
        run: npx --prefix frontend playwright test
        env:
          CI: true

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: frontend/test-results/

  # ============================================================================
  # Security Audit
  # ============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Frontend Dependency Audit
        run: npm --prefix frontend audit --audit-level=high || true

      - name: Workers Dependency Audit
        run: npm --prefix workers audit --audit-level=high || true

      - name: Check for Secrets in Code
        run: |
          echo "Scanning for hardcoded secrets..."
          if grep -rn "password\s*=\s*['\"]" frontend/src/ workers/src/ --include="*.ts" --include="*.tsx" | grep -v "password_hash" | grep -v "test" | grep -v ".d.ts"; then
            echo "WARNING: Potential hardcoded password found"
          else
            echo "No hardcoded secrets found"
          fi

      - name: Check Security Headers
        run: |
          echo "Verifying security headers in backend..."
          grep -n "X-Content-Type-Options" workers/src/index.ts && echo "✓ nosniff header" || echo "✗ Missing nosniff"
          grep -n "X-Frame-Options" workers/src/index.ts && echo "✓ X-Frame-Options header" || echo "✗ Missing X-Frame-Options"
          grep -n "Content-Security-Policy" workers/src/index.ts && echo "✓ CSP header" || echo "✗ Missing CSP"

  # ============================================================================
  # Build & Bundle Analysis
  # ============================================================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [unit-tests, security-audit]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm --prefix frontend ci

      - name: Build Frontend
        run: npm --prefix frontend run build

      - name: Analyze Bundle Size
        run: |
          echo "=== Bundle Size Report ==="
          du -sh frontend/dist/
          echo "=== Individual Assets ==="
          find frontend/dist -name '*.js' -o -name '*.css' | xargs ls -lh | sort -k5 -h
          echo "=== Total JS Size ==="
          find frontend/dist -name '*.js' | xargs cat | wc -c | awk '{printf "%.2f KB\n", $1/1024}'

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Install Workers Dependencies
        run: npm --prefix workers ci

  # ============================================================================
  # Build Android APK
  # ============================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Install dependencies
        run: |
          cd android
          flutter pub get

      - name: Build APK and AAB
        run: |
          cd android
          flutter build apk --release
          flutter build appbundle --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/chessos.apk
          mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/flutter-apk/chessos.aab

      - name: Upload Mobile Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chessos-pro-mobile
          path: |
            android/build/app/outputs/flutter-apk/chessos.apk
            android/build/app/outputs/flutter-apk/chessos.aab

  # ============================================================================
  # Deploy to Cloudflare (on main branch only)
  # ============================================================================
  deploy-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: chessos-pro
          directory: frontend/dist/
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-workers:
    name: Deploy Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Workers Dependencies
        run: npm --prefix workers ci

      - name: Deploy Workers
        run: npx --prefix workers wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
