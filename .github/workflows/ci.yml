name: ChessOS Pro — Enterprise CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Run Complete Platform Verification Suite
        run: |
          sh scripts/verify-tests.sh
          sh scripts/verify-coverage.sh
          sh scripts/verify-security.sh
          sh scripts/verify-performance.sh
          sh scripts/verify-accessibility.sh
          sh scripts/verify-docs.sh
          sh scripts/verify-architecture.sh
          sh scripts/verify-release.sh
